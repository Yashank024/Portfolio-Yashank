<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Fonts — loaded via link tag (Tailwind v4 CSS @import incompatible with external URLs) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <!-- Security Headers (Defense in Depth) -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' type.fit; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' ws: wss:;">
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <!-- Primary Meta Tags -->
  <title>Yashank Gupta | AI Software Developer</title>
  <meta name="title" content="Yashank Gupta | AI Software Developer" />
  <meta name="description" content="Portfolio of Yashank Gupta, a Web Developer specializing in React, Three.js, and high-performance interactive web experiences. Crafting products that impress." />
  <meta name="keywords" content="Yashank Gupta, Web Developer, React Developer, Three.js, WebGL, Frontend Developer, India, Portfolio" />
  <meta name="author" content="Yashank Gupta" />

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://portfolio-yashank.pages.dev/" />
  <meta property="og:title" content="Yashank Gupta | AI Software Developer" />
  <meta property="og:description" content="Portfolio of Yashank Gupta, a Web Developer specializing in React, Three.js, and high-performance interactive web experiences." />
  <meta property="og:image" content="https://portfolio-yashank.pages.dev/Yashank.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://portfolio-yashank.pages.dev/" />
  <meta property="twitter:title" content="Yashank Gupta | AI Software Developer" />
  <meta property="twitter:description" content="Portfolio of Yashank Gupta, a Web Developer specializing in React, Three.js, and high-performance interactive web experiences." />
  <meta property="twitter:image" content="https://portfolio-yashank.pages.dev/Yashank.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Yashank Gupta",
      "jobTitle": "Web Developer",
      "url": "https://portfolio-yashank.pages.dev/",
      "sameAs": [
        "https://www.linkedin.com/in/yashank-gupta",
        "https://github.com/Yashank024"
      ],
      "knowsAbout": ["React", "Three.js", "WebGL", "JavaScript", "Frontend Development"],
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Uttar Pradesh",
        "addressCountry": "India"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
